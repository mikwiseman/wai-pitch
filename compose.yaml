services:
  app:
    build:
      context: .
    image: wai-design:local
    restart: unless-stopped
    init: true
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-https://design.waiwai.is}
      RESEND_API_KEY: ${RESEND_API_KEY:?RESEND_API_KEY is required}
      AUTH_EMAIL_FROM: ${AUTH_EMAIL_FROM:-WAI Design <design@mail.waiwai.is>}
      LEGACY_OWNER_EMAIL: ${LEGACY_OWNER_EMAIL:?LEGACY_OWNER_EMAIL is required}
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      start_period: 20s
      retries: 3

  caddy:
    image: caddy:2.11.4-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:2019/config/"]
      interval: 20s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  caddy_data:
  caddy_config:
